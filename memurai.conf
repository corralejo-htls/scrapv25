# memurai.conf — BookingScraper Pro v6.0.0
# Generado automáticamente por scripts/gen_memurai_conf.py
# NO editar manualmente — ejecuta gen_memurai_conf.py para regenerar.
#
# Memurai Developer Edition — compatible con Redis 5.x API
# Docs: https://docs.memurai.com/

# ── Red ──────────────────────────────────────────────────────────────────────
bind 127.0.0.1
port 6379
protected-mode yes

# ── Base de datos y directorios ──────────────────────────────────────────────
# FIX-MEMURAI-005: rutas generadas con pathlib — sin dobles backslashes.
dir C:/BookingScraper

# ── Logging ──────────────────────────────────────────────────────────────────
loglevel notice
logfile C:/BookingScraper/logs/memurai.log

# ── Persistencia (RDB) ───────────────────────────────────────────────────────
# Guardado periódico. En desarrollo puedes comentar estas líneas.
save 900 1
save 300 10
save 60  10000
dbfilename dump.rdb
stop-writes-on-bgsave-error yes
rdbcompression yes
rdbchecksum yes

# ── Memoria ──────────────────────────────────────────────────────────────────
# Ajustar según RAM disponible; 256 MB es suficiente para BookingScraper.
maxmemory 256mb
maxmemory-policy allkeys-lru


# ── Seguridad ────────────────────────────────────────────────────────────────
# Descomenta y cambia la contraseña en producción si expones el puerto.
# requirepass tu_password_aqui

# ── Rendimiento ──────────────────────────────────────────────────────────────
databases 16
hz 10


# FIX-BUF-001: Buffer de salida para clientes normales (Celery Worker, redis-py)
# Formato: client-output-buffer-limit <clase> <hard-limit> <soft-limit> <soft-secs>
# hard-limit: desconecta inmediatamente si se supera
# soft-limit: desconecta si se mantiene por más de soft-secs segundos
# 0 = sin límite para esa dimensión
#
# El valor anterior (por defecto) causaba desconexión a los 8.4 MB.
# Con 32mb hard / 16mb soft / 90s se permite picos de datos sin desconectar.
client-output-buffer-limit normal 32mb 16mb 90
client-output-buffer-limit slave 256mb 64mb 60
client-output-buffer-limit pubsub 32mb 16mb 90

# FIX-BUF-002: Aumentar el límite de lista de comandos en cola
# tcp-backlog default 511 — adecuado para single-node - antes tcp-backlog 128
tcp-backlog 511

# Timeout de cliente inactivo — 0 = sin timeout (recomendado para Celery)
timeout 0

# Keepalive TCP cada 300s (5 min) — detecta conexiones muertas en Windows
tcp-keepalive 300

# Tamaño del buffer de lectura de red (bytes) — aumentar para respuestas grandes
proto-max-bulk-len 512mb


# --- FIN DEL PATCH ---

# ============================================================================
# VERIFICACIÓN POST-RESTART:
#   En una terminal con memurai-cli:
#     memurai-cli -p 6379 CONFIG GET client-output-buffer-limit
#   Debe mostrar los nuevos valores.
#
#   Para monitorear buffers en tiempo real:
#     memurai-cli -p 6379 CLIENT LIST
#   La columna omem debe mantenerse baja durante operación normal.
# ============================================================================
