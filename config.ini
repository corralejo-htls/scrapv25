# ============================================================================
# config.ini — BookingScraper Pro v6.0.0 build 54
# Configuración INI para componentes que no usan .env / pydantic-settings.
# Platform: Windows 11 / PostgreSQL 14+ / Python 3.14.x
# ============================================================================

[app]
name = BookingScraper Pro
version = 6.0.0
build = 54

[database]
# Referencia: los valores reales se leen del .env via pydantic-settings.
# Esta sección es informativa para herramientas externas.
host = localhost
port = 5432
name = bookingscraper
schema_file = schema_v54_complete.sql

[postgresql_tuning]
# Windows 11 Desktop Heap limitation
max_connections = 50
shared_buffers = 25%_of_RAM
effective_cache_size = 50%_of_RAM
work_mem = 8MB
maintenance_work_mem = 256MB
wal_buffers = 16MB
checkpoint_completion_target = 0.9
random_page_cost = 1.1
effective_io_concurrency = 1

[scraper]
max_workers = 2
request_timeout = 30
retry_delay = 2.0
max_retries = 3

[languages]
enabled = es,en,de,fr,it,nl,pt

[windows]
service_name = BookingScraperPro
power_plan = High Performance
defender_exclusions = data/,logs/,backups/
long_path_support = true

[logging]
level = INFO
max_bytes = 10485760
backup_count = 5
format = json
